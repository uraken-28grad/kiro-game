<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="sans-serif">
  <!-- Background -->
  <rect width="900" height="720" fill="#f8f9fa" rx="8"/>

